<div class="page-container">

  <!-- Left: form panel -->
  <section class="form-panel">
    <div class="form-wrapper">

      <h1 class="form-title">Recuperar Contraseña</h1>
      <p class="form-subtitle">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

      <div class="field">
        <label class="field__label" for="email">Correo electrónico:</label>
        <input
          id="email"
          class="field__input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder=""
          autocomplete="email"
        />
      </div>

      <button class="btn-primary" type="button" (click)="enviar()" [disabled]="loading()">
        {{ loading() ? 'Enviando...' : 'Enviar Correo de Recuperación' }}
      </button>

      <button class="btn-link" type="button" (click)="irAlLogin()">
        Volver al inicio de sesión
      </button>

    </div>
  </section>

  <!-- Right: image panel -->
  <section class="image-panel">
    <div class="image-panel__overlay">
      <p class="image-panel__text">¿Olvido su</p>
      <p class="image-panel__text">contraseña?</p>
    </div>
  </section>

</div>
