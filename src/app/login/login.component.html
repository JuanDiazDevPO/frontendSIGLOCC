<div class="login-container">

  <!-- Left: form panel -->
  <section class="form-panel">
    <div class="form-wrapper">

      <h1 class="form-title">Ingresar</h1>
      <p class="form-subtitle">Ingresar a su cuenta</p>

      <div class="field">
        <label class="field__label" for="email">Correo electrónico</label>
        <input
          id="email"
          class="field__input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder=""
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label class="field__label" for="password">Contraseña</label>
        <input
          id="password"
          class="field__input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder=""
          autocomplete="current-password"
        />
      </div>

      <div class="form-options">
        <label class="remember-label">
          <input
            class="remember-label__checkbox"
            type="checkbox"
            [(ngModel)]="remember"
            name="remember"
          />
          Recordar
        </label>
        <a class="link" routerLink="/forgot-password">Cambiar contraseña?</a>
      </div>

      <button class="btn-primary" type="button" (click)="login()">
        Ingresar
      </button>

      @if (error) {
        <p class="form-error">{{ error }}</p>
      }

    </div>
  </section>

  <!-- Right: image panel -->
  <section class="image-panel">
    <div class="image-panel__overlay">
      <p class="image-panel__welcome">Bienvenido a</p>
      <p class="image-panel__brand">SIGLOCC</p>
    </div>
  </section>

</div>
