<div class="page-container">

  <!-- Left: form panel -->
  <section class="form-panel">
    <div class="form-wrapper">

      <h1 class="form-title">Nueva Contraseña</h1>
      <p class="form-subtitle">Ingresa y confirma tu nueva contraseña.</p>

      <div class="field">
        <label class="field__label" for="nuevaPassword">Nueva Contraseña:</label>
        <input
          id="nuevaPassword"
          class="field__input"
          type="password"
          [(ngModel)]="nuevaPassword"
          name="nuevaPassword"
          placeholder=""
          autocomplete="new-password"
        />
      </div>

      <div class="field">
        <label class="field__label" for="confirmarPassword">Confirmar contraseña:</label>
        <input
          id="confirmarPassword"
          class="field__input"
          type="password"
          [(ngModel)]="confirmarPassword"
          name="confirmarPassword"
          placeholder=""
          autocomplete="new-password"
        />
      </div>

      <p class="password-hint">
        Tu nueva contraseña debe tener mínimo 8 caracteres y combinar letras (mayúsculas y minúsculas), números y al menos un carácter especial (como !, @, #, $, etc.)
      </p>

      <button class="btn-primary" type="button" (click)="confirmar()" [disabled]="loading()">
        {{ loading() ? 'Guardando...' : 'Confirmar Cambio de Contraseña' }}
      </button>

    </div>
  </section>

  <!-- Right: image panel -->
  <section class="image-panel">
    <div class="image-panel__overlay">
      <p class="image-panel__text">¿Olvido su</p>
      <p class="image-panel__text">contraseña?</p>
    </div>
  </section>

</div>
